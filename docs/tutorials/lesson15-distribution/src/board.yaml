machine:
  name: "dist-test-board"
  cpus:
    - name: "cpu0"
      type: "cortex-a15-arm-cpu"

peripherals:
  - name: "ram"
    type: "Memory.MappedMemory"
    address: 0x40000000
    properties:
      size: 0x08000000

  - name: "uart0"
    type: "UART.PL011"
    address: 0x09000000
    interrupts:
      - 33

topology:
  links: []
