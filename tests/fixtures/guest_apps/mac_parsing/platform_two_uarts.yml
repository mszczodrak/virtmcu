machine:
  cpus:
    - name: cpu0
      type: cortex-a15

peripherals:
  - name: ram0
    type: Memory.MappedMemory
    address: 0x40000000
    properties:
      size: 0x04000000 # 64MB

  - name: uart0
    type: UART.PL011
    address: 0x09000000
    interrupts: [33]

  - name: uart1
    type: UART.PL011
    address: 0x09005000
    interrupts: [34]

topology:
  links: []
