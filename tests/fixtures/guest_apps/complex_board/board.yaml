# tests/fixtures/guest_apps/complex_board/board.yaml
# Verification board for Wireless & RF Simulation
machine:
  name: iot_node
  type: arm-generic-fdt
  cpus:
    - name: cpu0
      type: cortex-a15

peripherals:
  - name: gic
    type: IRQControllers.ARM_GenericInterruptController
    address: 0x08000000

  - name: sram
    type: Memory.MappedMemory
    address: 0x40000000
    properties:
      size: 0x01000000

  - name: uart0
    type: UART.PL011
    address: 0x09000000

  - name: radio0
    type: ieee802154
    address: 0x09001000
    properties:
      node: 0

  - name: ble0
    type: chardev
    properties:
      node: "0"
      topic: "sim/rf/hci/0"
      id: "hci0"

topology:
  links: []
