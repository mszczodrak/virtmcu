# qenode standalone docker-compose.
#
# Runs a minimal simulation environment for development and CI testing
# without a physics engine.  World overlays (pendulum.yml, drone.yml, …)
# add the physics node and override cyber-node's firmware + machine config.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up
#   docker compose -f docker/docker-compose.yml -f worlds/pendulum.yml up

services:

  # ── 1. Federation Bus ───────────────────────────────────────────────────────
  zenoh-router:
    image: eclipse/zenoh:latest
    command: ["--rest-http-port", "8000"]
    ports:
      - "7447:7447"   # Zenoh protocol
      - "8000:8000"   # Zenoh REST
    networks:
      - qenode-net
    healthcheck:
      test: ["CMD", "sh", "-c", "echo > /dev/tcp/localhost/7447"]
      interval: 2s
      timeout: 3s
      retries: 10

  # ── 2. cyber-node (QEMU + NodeAgent) ───────────────────────────────────────
  cyber-node:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ARCH: arm
    networks:
      - qenode-net
    environment:
      ZENOH_ROUTER: tcp/zenoh-router:7447
      NODE_ID: "0"
      QEMU_CLOCK_SOCKET: /tmp/qemu-clock.sock
      # Clock mode: standalone (free-running) | slaved (icount, MuJoCo-driven)
      CLOCK_MODE: standalone
    volumes:
      # Mount firmware from outside if needed:
      # - ../firmware:/app/firmware:ro
      # Mount tools for live development:
      - ../tools:/app/tools:ro
    depends_on:
      zenoh-router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-S", "/tmp/qemu-clock.sock"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s
    command: ["python3", "-m", "tools.node_agent"]
    tty: true

networks:
  qenode-net:
    driver: bridge
