# virtmcu standalone docker-compose.
#
# Runs a minimal simulation environment for development and CI testing
# without a physics engine.  World overlays (pendulum.yml, drone.yml, …)
# add the physics node and override cyber-node's firmware + machine config.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up
#   docker compose -f docker/docker-compose.yml -f worlds/pendulum.yml up

services:

  # ── 1. Federation Bus ───────────────────────────────────────────────────────
  zenoh-router:
    image: eclipse/zenoh:latest
    command: ["--rest-http-port", "8000"]
    ports:
      - "7447:7447"   # Zenoh protocol
      - "8000:8000"   # Zenoh REST
    networks:
      - virtmcu-net
    healthcheck:
      test: ["CMD", "sh", "-c", "echo > /dev/tcp/localhost/7447"]
      interval: 2s
      timeout: 3s
      retries: 10

  # ── 2. cyber-node (QEMU + hw/rust) ───────────────────────────────────────
  cyber-node:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ARCH: arm
    networks:
      - virtmcu-net
    environment:
      ZENOH_ROUTER: tcp/zenoh-router:7447
      NODE_ID: "0"
    volumes:
      # Mount firmware from outside if needed:
      # - ../firmware:/app/firmware:ro
      # Mount tools for live development:
      - ../tools:/app/tools:ro
      - ../test:/app/test:ro
      - ../scripts:/app/scripts:ro
    depends_on:
      zenoh-router:
        condition: service_healthy
    # NOTE: No -kernel is provided here. QEMU executes from the reset vector but
    # has no meaningful firmware; the clock hook fires at the first TB
    # boundary and blocks the vCPU waiting for a clock advance. Overlays (like
    # pendulum.yml) should override this command to supply a -kernel.
    command: ["/app/scripts/run.sh", "--dtb", "/app/tests/fixtures/guest_apps/boot_arm/minimal.dtb", "-device", "clock,mode=suspend,node=0"]
    tty: true

networks:
  virtmcu-net:
    driver: bridge
