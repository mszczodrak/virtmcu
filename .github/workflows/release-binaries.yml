name: Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-binaries:
    name: Build Binaries (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            os: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          platforms: ${{ matrix.platform }}
          build-args: |
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
          load: true
          tags: virtmcu-builder:${{ matrix.arch }}
          cache-from: type=gha,scope=builder-${{ matrix.arch }}

      - name: Extract binaries from container
        run: |
          docker create --name extract virtmcu-builder:${{ matrix.arch }}
          docker cp extract:/opt/virtmcu ./virtmcu-dist
          docker rm extract
          
          # Include basic project info
          cp LICENSE ./virtmcu-dist/
          cat <<EOF > ./virtmcu-dist/README-BINARY.md
          # virtmcu QEMU Binaries
          
          This package contains a patched version of QEMU with support for:
          - arm-generic-fdt machine
          - Zenoh-based deterministic networking and clock synchronization
          - Dynamic QOM plugin loading
          
          ## System Requirements
          This is a dynamically linked QEMU build for Ubuntu 24.04 (or compatible glibc-based Linux).
          You will need the following runtime dependencies installed on your host:
          \`\`\`bash
          sudo apt-get update && sudo apt-get install -y libglib2.0-0 libpixman-1-0 libslirp0
          \`\`\`
          
          ## Architecture
          - Host: ${{ matrix.arch }}
          - Target Guest Support: ARM, RISC-V (32/64)
          
          ## Usage
          The binaries in \`bin/\` have their RPATH set to find libraries in \`../lib/\`.
          No LD_LIBRARY_PATH should be required.
          
          Example:
          ./bin/qemu-system-arm -M arm-generic-fdt -dtb your_board.dtb
          EOF

      - name: Portable Smoke Test
        run: |
          # Test the extracted binary in a clean ubuntu container
          docker run --rm -v $(pwd)/virtmcu-dist:/virtmcu-dist ubuntu:24.04 bash -c "
            apt-get update && apt-get install -y --no-install-recommends libglib2.0-0 libpixman-1-0 libslirp0
            /virtmcu-dist/bin/qemu-system-arm --version
            /virtmcu-dist/bin/qemu-system-riscv64 --version
            # Verify that it can find the modules without LD_LIBRARY_PATH
            /virtmcu-dist/bin/qemu-system-arm -device help | grep -q 'dummy-device'
          "

      - name: Create Tarball
        run: |
          TARBALL_NAME="virtmcu-qemu-${{ env.QEMU_VERSION }}-${{ matrix.arch }}.tar.gz"
          tar -czf "$TARBALL_NAME" -C ./virtmcu-dist .
          echo "TARBALL_PATH=$TARBALL_NAME" >> $GITHUB_ENV

      - name: Build virtmcu-tools
        if: matrix.arch == 'amd64'
        run: |
          # Build only once (on amd64 runner) since it's a pure python package
          cd packaging/virtmcu-tools
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv build
          cp dist/* ../../

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtmcu-release-assets-${{ matrix.arch }}
          path: |
            ${{ env.TARBALL_PATH }}
            *.whl
            *.tar.gz

  create-release:
    name: Create Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: virtmcu-release-assets-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/virtmcu-qemu-*.tar.gz
            artifacts/*.whl
            artifacts/virtmcu_tools-*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
