name: CI (Main)

# Runs on every push to main and on version tags.
# Performs the full validation pipeline and then publishes all images to GHCR.
#
# Jobs are structured in six tiers:
#   1. lint + unit-tests       — fast, no QEMU
#   2. build-qemu              — build the Docker builder image (both amd64 + arm64)
#   3. publish-devenv-base     — parallel with build-qemu, after tier1
#   4. smoke tests + coverage  — full matrix against the builder image
#   5. publish-devenv          — after build-qemu + devenv-base
#   6. publish-runtime         — after smoke tests pass
#
# The expensive QEMU build is cached via GitHub Actions Docker layer cache.
# First run is slow (~40 min); subsequent runs with unchanged patches/ and hw/
# are fast (~3 min, fully from cache).

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BUILDER_IMAGE: virtmcu-builder
  PYTHON_VERSION: "3.13"
  VIRTMCU_STALL_TIMEOUT_MS: "120000"
  CI: "true"

# ── Selective Execution ───────────────────────────────────────────────────────

jobs:
  changes:
    name: Check for source changes
    runs-on: ubuntu-latest
    outputs:
      expensive: ${{ steps.filter.outputs.expensive }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            expensive:
              - '!(**/*.md)'
              - '!(docs/**)'
              - '!(.github/**)'
              - '.github/workflows/ci-main.yml'

# ── Tier 1: Lint ──────────────────────────────────────────────────────────────

  tier1-checks:
    name: Tier 1 (Lint & Unit Tests)
    needs: [changes]
    if: needs.changes.outputs.expensive == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Load BUILD_DEPS
        run: grep -E -v '^#|^$' BUILD_DEPS >> "$GITHUB_ENV"

      - name: Set up Workspace Trust
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build local devenv-base image
        uses: docker/bake-action@v7
        env:
          ARCH: amd64
          PUSH_CACHE: "true"
        with:
          targets: devenv-base
          load: true

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo-ci-registry
          key: cargo-registry-tier1-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-tier1-${{ runner.os }}-

      - name: Fix workspace and Cargo registry permissions
        run: |
          sudo chown -R 1000:1000 .
          mkdir -p "$HOME/.cargo-ci-registry"
          sudo chown -R 1000:1000 "$HOME/.cargo-ci-registry"

      - name: Run Static Analysis (Lint)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo-ci-registry:/usr/local/cargo/registry" \
            -w /workspace \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e USER=vscode \
            -e CARGO_TARGET_DIR=/tmp/ci-target \
            ghcr.io/refractsystems/virtmcu/devenv-base:dev-amd64 \
            make lint

      - name: Build Packaging Tools
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo-ci-registry:/usr/local/cargo/registry" \
            -w /workspace \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e USER=vscode \
            -e CARGO_TARGET_DIR=/tmp/ci-target \
            ghcr.io/refractsystems/virtmcu/devenv-base:dev-amd64 \
            make build-tools

      - name: Run Tier 1 Unit Tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo-ci-registry:/usr/local/cargo/registry" \
            -w /workspace \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e USER=vscode \
            -e CARGO_TARGET_DIR=/tmp/ci-target \
            ghcr.io/refractsystems/virtmcu/devenv-base:dev-amd64 \
            make test-unit

      - name: Restore workspace permissions
        if: always()
        run: |
          sudo chown -R runner:docker .
          sudo chown -R runner:docker "$HOME/.cargo-ci-registry" || true

# ── Tier 2: Build QEMU ────────────────────────────────────────────────────────

  setup:
    name: Configure build matrix
    runs-on: ubuntu-latest
    outputs:
      arches: ${{ steps.arches.outputs.arches }}
    steps:
      - name: Set target architectures
        id: arches
        run: echo 'arches=["amd64","arm64"]' >> "$GITHUB_OUTPUT"

  generate-matrix:
    name: Generate smoke test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Build matrix from smoke-phases.json
        id: gen
        run: |
          PHASES=$(cat .github/smoke-phases.json)
          MATRIX=$(jq -nc \
            --argjson phases "$PHASES" \
            '{
              arch: ["amd64","arm64"],
              phase: [$phases[].phase],
              include: ([{arch: "amd64", os: "ubuntu-latest"}, {arch: "arm64", os: "ubuntu-24.04-arm"}] + $phases)
            }')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-qemu:
    name: Build QEMU — ${{ matrix.arch }}
    needs: [changes, setup]
    if: needs.changes.outputs.expensive == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.setup.outputs.arches) }}
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        if: matrix.arch == 'amd64'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6

      - name: Load BUILD_DEPS
        run: grep -E -v '^#|^$' BUILD_DEPS >> "$GITHUB_ENV"

      - name: Compute QEMU cache tag
        run: |
          PATCHES_HASH=$(
            { find patches/ -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null
              sha256sum scripts/apply-qemu-patches.sh 2>/dev/null
            } | sha256sum | cut -c1-12
          )
          echo "QEMU_CACHE_TAG=${QEMU_VERSION}-${PATCHES_HASH}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # qemu-base is built and pushed here on every main merge.
      # Its content-addressed tag (QEMU_VERSION + patches hash) means
      # Docker skips the 40-minute compile when nothing changed.
      - name: Build and push builder stage
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "true"
          QEMU_CACHE_TAG: ${{ env.QEMU_CACHE_TAG }}
        with:
          targets: |
            base
            toolchain
            qemu-base
            builder
          push: true
          files: |
            docker-bake.hcl
            ${{ startsWith(github.ref, 'refs/heads/') && 'docker-bake-latest.hcl' || '' }}

      - name: Verify QEMU binary
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-${{ matrix.arch }} \
            qemu-system-arm --version

# ── Tier 3: Publish Environment Images (Parallel Path) ───────────────────────

  publish-devenv-base:
    name: Publish Devenv Base — ${{ matrix.arch }}
    needs: [tier1-checks]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        if: matrix.arch == 'amd64'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6

      - name: Load BUILD_DEPS
        run: grep -E -v '^#|^$' BUILD_DEPS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push — devenv-base (${{ matrix.arch }})
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "true"
        with:
          targets: devenv-base
          push: true
          files: |
            docker-bake.hcl
            ${{ startsWith(github.ref, 'refs/heads/') && 'docker-bake-latest.hcl' || '' }}

  publish-devenv:
    name: Publish Devenv — ${{ matrix.arch }}
    needs: [build-qemu, publish-devenv-base]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        if: matrix.arch == 'amd64'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6

      - name: Load BUILD_DEPS
        run: grep -E -v '^#|^$' BUILD_DEPS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push — devenv (${{ matrix.arch }})
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "true"
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          targets: devenv
          push: true
          files: |
            docker-bake.hcl
            ${{ startsWith(github.ref, 'refs/heads/') && 'docker-bake-latest.hcl' || '' }}
            ${{ startsWith(github.ref, 'refs/tags/') && 'docker-bake-release.hcl' || '' }}

  merge-devenv:
    name: Merge Devenv Manifest
    needs: [publish-devenv]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Load BUILD_DEPS
        run: grep -E -v '^#|^$' BUILD_DEPS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — devenv
        id: meta-devenv
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=virtmcu-devenv
            org.opencontainers.image.description=virtmcu development environment — toolchain + AI tools
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Create and push manifest — devenv
        run: |
          TAGS=$(echo "${{ steps.meta-devenv.outputs.tags }}" | xargs -I {} echo "-t {}")
          # shellcheck disable=SC2086
          docker buildx imagetools create ${TAGS} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-arm64

# ── Tier 4: Smoke Tests (amd64 + arm64) ──────────────────────────────────────

  smoke-tests:
    name: Smoke — ${{ matrix.name }} (${{ matrix.arch }})
    needs: [changes, build-qemu, tier1-checks, generate-matrix]
    if: needs.changes.outputs.expensive == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Load BUILD_DEPS
        run: grep -E -v '^#|^$' BUILD_DEPS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Pull builder image
        run: |
          for i in {1..5}; do
            if docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-${{ matrix.arch }}"; then
              break
            fi
            sleep 15
            if [ "$i" -eq 5 ]; then exit 1; fi
          done
          docker tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-${{ matrix.arch }}" "${{ env.BUILDER_IMAGE }}:${{ github.sha }}"

      - name: Run ${{ matrix.name }}
        run: |
          mkdir -p coverage-data
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            -e GCOV_PREFIX=/workspace/coverage-data \
            -e GCOV_PREFIX_STRIP=3 \
            -e USER=vscode \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash scripts/ci-phase.sh ${{ matrix.phase }}

      - name: Upload results and coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: results-phase-${{ matrix.phase }}-${{ matrix.arch }}
          path: |
            test-results/
            coverage-data/

# ── Tier 5: Coverage Reports ──────────────────────────────────────────────────

  peripheral-coverage:
    name: Peripheral C Coverage
    needs: [changes, smoke-tests]
    if: needs.changes.outputs.expensive == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load BUILD_DEPS
        run: grep -E -v '^#|^$' BUILD_DEPS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Pull builder image
        run: |
          for i in {1..5}; do
            if docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-amd64"; then
              break
            fi
            sleep 15
            if [ "$i" -eq 5 ]; then exit 1; fi
          done
          docker tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-amd64" "${{ env.BUILDER_IMAGE }}:${{ github.sha }}"

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v6
        with:
          path: all-coverage
          pattern: results-phase-*-amd64
          merge-multiple: true

      - name: Generate unified peripheral coverage
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e USER=vscode \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash scripts/test-coverage-peripheral.sh

      - name: Upload peripheral coverage results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: peripheral-c-coverage
          path: test-results/

  firmware-coverage:
    name: Guest Firmware Coverage
    needs: [changes, build-qemu, tier1-checks]
    if: needs.changes.outputs.expensive == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load BUILD_DEPS
        run: grep -E -v '^#|^$' BUILD_DEPS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Pull builder image
        run: |
          for i in {1..5}; do
            if docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-amd64"; then
              break
            fi
            sleep 15
            if [ "$i" -eq 5 ]; then exit 1; fi
          done
          docker tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-amd64" "${{ env.BUILDER_IMAGE }}:${{ github.sha }}"

      - name: Run coverage analysis (Phase 1)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash scripts/test-coverage-guest.sh

# ── Tier 6: Publish Runtime (after validation) ──────────────────────────────

  publish-runtime:
    name: Publish Runtime — ${{ matrix.arch }}
    needs: [smoke-tests, peripheral-coverage, firmware-coverage]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Load BUILD_DEPS
        run: grep -E -v '^#|^$' BUILD_DEPS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push — runtime (${{ matrix.arch }})
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "true"
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          targets: runtime
          push: true
          files: |
            docker-bake.hcl
            ${{ startsWith(github.ref, 'refs/heads/') && 'docker-bake-latest.hcl' || '' }}
            ${{ startsWith(github.ref, 'refs/tags/') && 'docker-bake-release.hcl' || '' }}

  merge-runtime:
    name: Merge Runtime Manifest
    needs: [publish-runtime]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Load BUILD_DEPS
        run: grep -E -v '^#|^$' BUILD_DEPS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — runtime
        id: meta-runtime
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/runtime
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=virtmcu-runtime
            org.opencontainers.image.description=virtmcu runtime image — QEMU + Python simulation tools
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Create and push manifest — runtime
        run: |
          TAGS=$(echo "${{ steps.meta-runtime.outputs.tags }}" | xargs -I {} echo "-t {}")
          # shellcheck disable=SC2086
          docker buildx imagetools create ${TAGS} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/runtime:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/runtime:sha-${{ github.sha }}-arm64
