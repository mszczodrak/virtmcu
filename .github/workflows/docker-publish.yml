name: Docker Publish

# Builds and pushes all image stages to GitHub Container Registry (GHCR)
# on every push to main and on version tags (e.g. v1.2.3).
#
# Images published:
#   ghcr.io/<owner>/<repo>/devenv  — toolchain-only devcontainer base
#   ghcr.io/<owner>/<repo>/runtime — lean runtime with QEMU + Python tools
#
# Strategy: Native Matrix Builds
#   1. 'build' job runs in parallel on ubuntu-latest (AMD64) and ubuntu-24.04-arm (ARM64).
#   2. Architecture-specific images are pushed with suffixes (-amd64, -arm64).
#   3. 'merge' job combines them into a single multi-arch manifest using Buildx imagetools.
#   This avoids slow QEMU software emulation during compilation.

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BASE: ${{ github.repository }}

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME_BASE }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ── devenv image ────────────────────────────────────────────────────────

      - name: Build and push — devenv (${{ matrix.arch  }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: devenv
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-${{ matrix.arch }}
          build-args: |
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
          cache-from: type=gha,scope=devenv-${{ matrix.arch }}
          cache-to: type=gha,scope=devenv-${{ matrix.arch }},mode=max

      # ── runtime image ───────────────────────────────────────────────────────

      - name: Build and push — runtime (${{ matrix.arch  }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/runtime:sha-${{ github.sha }}-${{ matrix.arch }}
          # Reuse the builder cache populated by ci.yml
          build-args: |
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
          cache-from: |
            type=gha,scope=builder-${{ matrix.arch }}
            type=gha,scope=runtime-${{ matrix.arch }}
          cache-to: type=gha,scope=runtime-${{ matrix.arch }},mode=max

  merge:
    name: Merge Manifests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME_BASE }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ── devenv manifest ─────────────────────────────────────────────────────

      - name: Docker metadata — devenv
        id: meta-devenv
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=virtmcu-devenv
            org.opencontainers.image.description=virtmcu development environment — toolchain + AI tools
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Create and push manifest — devenv
        run: |
          TAGS=$(echo "${{ steps.meta-devenv.outputs.tags }}" | xargs -I {} echo "-t {}")
          # hadolint ignore=DL3059
          docker buildx imagetools create $TAGS \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-arm64

      # ── runtime manifest ────────────────────────────────────────────────────

      - name: Docker metadata — runtime
        id: meta-runtime
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/runtime
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=virtmcu-runtime
            org.opencontainers.image.description=virtmcu runtime image — QEMU + Python simulation tools
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Create and push manifest — runtime
        run: |
          TAGS=$(echo "${{ steps.meta-runtime.outputs.tags }}" | xargs -I {} echo "-t {}")
          # hadolint ignore=DL3059
          docker buildx imagetools create $TAGS \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/runtime:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/runtime:sha-${{ github.sha }}-arm64
