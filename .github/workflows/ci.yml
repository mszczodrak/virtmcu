name: CI

# Runs on every push to main and on every PR targeting main.
# Jobs are structured in three tiers:
#   1. lint + unit-tests  — fast, no QEMU, always run in parallel
#   2. build-qemu         — build the Docker builder image (QEMU compiled inside)
#   3. integration        — smoke tests, pytest QMP suite, Robot Framework
#
# The expensive QEMU build is cached via GitHub Actions Docker layer cache
# (type=gha). First run is slow (~40 min); subsequent runs with unchanged
# patches/ and hw/ are fast (~3 min, fully from cache).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILDER_IMAGE: virtmcu-builder
  PYTHON_VERSION: "3.13"
  # CI runners can be slow; raise the zenoh-clock STALL timeout so the device
  # doesn't fire on load spikes.  Local dev keeps the 5 s default for fast feedback.
  VIRTMCU_STALL_TIMEOUT_MS: "60000"

# ── Tier 1: Lint ──────────────────────────────────────────────────────────────

jobs:

  lint:
    name: Static Analysis (Python/Shell/Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ruff — Python linting
        run: uv run ruff check tools/ tests/ patches/

      - name: ShellCheck — shell scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning
          ignore_paths: third_party .venv build tools/systemc_adapter/build

      - name: Hadolint — Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          # DL3008: pin apt versions — acceptable for a dev toolchain image
          # DL3009: apt-get clean — handled by rm -rf /var/lib/apt/lists/*
          # DL4006: set -o pipefail — handled by set -euo pipefail in scripts
          # SC2016: $ORIGIN in single quotes is literal, which is intended for rpath
          # SC2015: we use || true for sed commands
          ignore: DL3008,DL3009,DL4006,SC2016,SC2015

  check-versions:
    name: Check Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check version synchronization
        run: python3 scripts/check-versions.py

  virtmcu-tools-build:
    name: virtmcu-tools Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build package
        run: |
          cd packaging/virtmcu-tools
          uv build
          # Verify the wheel contains expected files
          WHEEL_FILE=$(ls dist/*.whl)
          unzip -l "$WHEEL_FILE" | grep "virtmcu_tools/repl2qemu/"
          unzip -l "$WHEEL_FILE" | grep "virtmcu_tools/yaml2qemu.py"
          unzip -l "$WHEEL_FILE" | grep "virtmcu_tools/mcp_server/"
          unzip -l "$WHEEL_FILE" | grep "virtmcu_tools/qmp_bridge.py"

  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: hw/rust

      - name: cargo fmt --check
        run: cargo fmt --manifest-path hw/rust/Cargo.toml --all --check

      - name: cargo clippy
        run: cargo clippy --manifest-path hw/rust/Cargo.toml --workspace -- -D warnings

# ── Tier 1: Unit Tests (no QEMU) ──────────────────────────────────────────────

  unit-tests:
    name: Unit Tests (no QEMU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      # device-tree-compiler needed by test_fdt_emitter (calls dtc)
      - name: Install dtc
        run: sudo apt-get install -y --no-install-recommends device-tree-compiler

      - name: pytest — unit tests with coverage
        run: |
          uv run pytest \
            --cov=tools \
            --cov-report=xml:test-results/unit-coverage.xml \
            --cov-report=term \
            tests/repl2qemu/ \
            tests/test_yaml2qemu.py \
            tests/test_cli_generator.py \
            tests/test_fdt_emitter.py \
            -v --tb=short \
            --junitxml=test-results/unit-tests.xml

      - name: Upload unit test and coverage results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: unit-test-results
          path: test-results/

# ── Tier 2: Build QEMU (Docker, cached) ──────────────────────────────────────

  build-qemu:
    name: Build QEMU (Docker cache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Populate the GHA Docker layer cache for the builder stage.
      # The QEMU clone + patch + compile is the expensive part; it is cached
      # as long as patches/, hw/, and scripts/setup-qemu.sh are unchanged.
      - name: Build and cache builder stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          cache-to: type=gha,scope=builder-amd64,mode=max
          load: true

      - name: Verify QEMU binary
        run: |
          docker run --rm ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            qemu-system-arm --version

# ── Tier 3: Smoke Tests (matrix) ─────────────────────────────────────────────
#
# Each phase runs its test/phaseX/smoke_test.sh inside the builder container
# with the workspace mounted at /workspace. Phases that need Python packages
# or a .venv get a per-phase pre-setup command.

  smoke-tests:
    name: Smoke — ${{ matrix.name }}
    needs: [build-qemu, unit-tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - phase: "1"
            name: "Phase 1 (Minimal Boot)"
            cmd: "make -C test/phase1 && bash test/phase1/smoke_test.sh"
          - phase: "2"
            name: "Phase 2 (QOM Plugins)"
            cmd: "bash test/phase2/smoke_test.sh"
          - phase: "3"
            name: "Phase 3 (repl2qemu)"
            cmd: "bash test/phase3/smoke_test.sh"
          - phase: "3.5"
            name: "Phase 3.5 (YAML Platforms)"
            cmd: "make -C test/phase1 && bash test/phase3.5/smoke_test.sh"
          - phase: "4"
            name: "Phase 4 (Robot Framework)"
            cmd: "make -C test/phase1 && bash test/phase4/smoke_test.sh"
          - phase: "5"
            name: "Phase 5 (SystemC Bridge)"
            cmd: "apt-get update && apt-get install -y --no-install-recommends libsystemc-dev && bash test/phase5/smoke_test.sh"
          - phase: "6"
            name: "Phase 6 (Zenoh Multi-Node)"
            cmd: "bash test/phase6/smoke_test.sh"
          - phase: "7"
            name: "Phase 7 (Zenoh Clock)"
            cmd: "bash test/phase7/smoke_test.sh"
          - phase: "8"
            name: "Phase 8 (Multi-Node UART)"
            cmd: "make -C test/phase1 && make -C test/phase8 && bash test/phase8/smoke_test.sh"
          - phase: "9"
            name: "Phase 9 (SystemC Media)"
            cmd: "apt-get update && apt-get install -y --no-install-recommends libsystemc-dev && make -C test/phase1 && bash test/phase9/smoke_test.sh"
          - phase: "10"
            name: "Phase 10 (Physics SAL/AAL)"
            cmd: "make -C test/phase1 && bash test/phase10/smoke_test.sh"
          - phase: "11"
            name: "Phase 11 (RISC-V Expansion)"
            cmd: "make -C test/riscv && bash test/phase11/smoke_test.sh"
          - phase: "11_3"
            name: "Phase 11.3 (Remote Port)"
            cmd: "cmake -S tools/systemc_adapter -B tools/systemc_adapter/build -DCMAKE_BUILD_TYPE=Release && make -C tools/systemc_adapter/build rp_adapter && bash test/phase11_3/smoke_test.sh"
          - phase: "12"
            name: "Phase 12 (Advanced Observability)"
            cmd: "make -C test/phase1 && make -C test/phase12 && bash test/phase12/smoke_test.sh"
          - phase: "16"
            name: "Phase 16 (Perf & Determinism)"
            cmd: "make -C test/phase1 && make -C test/phase16 && bash test/phase16/smoke_test.sh"
          - phase: "qmp"
            name: "pytest (QMP Suite)"
            cmd: "make -C test/phase1 && make -C test/phase8 && pytest tools/testing/test_qmp.py -v --tb=short"
          - phase: "robot"
            name: "Robot Framework (Renode Parity)"
            cmd: "make -C test/phase1 && make -C test/phase8 && robot --outputdir test-results/robot --xunit test-results/robot.xml tests/test_qmp_keywords.robot tests/test_interactive_echo.robot"

    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore builder image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Run ${{ matrix.name }}
        run: |
          mkdir -p coverage-data
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            -e GCOV_PREFIX=/workspace/coverage-data \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash -c "${{ matrix.cmd }}"

      - name: Upload results and coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: results-phase-${{ matrix.phase }}
          path: |
            test-results/
            coverage-data/

# ── Tier 4: Runtime Image Verification ───────────────────────────────────────

  verify-runtime:
    name: Verify Runtime Image
    needs: [build-qemu]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          tags: virtmcu-runtime:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Restore builder image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Build test artifacts
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace ${{ env.BUILDER_IMAGE }}:${{ github.sha }} make -C test/phase1

#      - name: Run verification script
#        run: |
#          chmod +x tests/test_runtime_image.sh
#          ./tests/test_runtime_image.sh ${{ env.BUILDER_IMAGE }}:${{ github.sha }}


# ── Tier 4: Peripheral Coverage Report ───────────────────────────────────────
#
# Collects .gcda files from the QEMU build tree after all integration tests
# have run and generates a unified coverage report for the C plugins.

  peripheral-coverage:
    name: Peripheral C Coverage
    needs: [smoke-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore builder image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-coverage
          pattern: results-phase-*
          merge-multiple: true

      - name: Generate unified peripheral coverage
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash -c '
              mkdir -p /workspace/test-results
              # gcovr can find .gcda files in the mounted coverage directory
              # We need to tell it where the source files are (/build/qemu/hw/virtmcu)
              # and where the object files/gcda files are (/workspace/all-coverage)
              gcovr -r /build/qemu/hw/virtmcu \
                --gcov-executable gcov \
                --object-directory /workspace/all-coverage \
                --xml /workspace/test-results/peripheral-coverage.xml \
                --html-details /workspace/test-results/peripheral-coverage.html \
                --print-summary
            '

      - name: Upload peripheral coverage results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: peripheral-c-coverage
          path: test-results/

# ── Tier 4: Guest Firmware Coverage ──────────────────────────────────────────
#
# Uses QEMU TCG plugins (drcov) to track guest firmware execution and maps
# results back to ELF symbols to ensure tests exercise the HAL.

  firmware-coverage:
    name: Guest Firmware Coverage
    needs: [build-qemu, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Load VERSIONS
        run: cat VERSIONS | grep -v '^#' | grep -v '^$' >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore builder image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: builder
          tags: ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            ARM_TOOLCHAIN_VERSION=${{ env.ARM_TOOLCHAIN_VERSION }}
            QEMU_REF=v${{ env.QEMU_VERSION }}
            ZENOH_C_REF=${{ env.ZENOH_VERSION }}
            CMAKE_VERSION=${{ env.CMAKE_VERSION }}
            RUST_VERSION=${{ env.RUST_VERSION }}
            FLATBUFFERS_VERSION=${{ env.FLATBUFFERS_VERSION }}
          cache-from: type=gha,scope=builder-amd64
          load: true

      - name: Run coverage analysis (Phase 1)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash -c '
              make -C test/phase1
              uv pip install --system --break-system-packages pyelftools
              # Find drcov plugin (priority: installed prefix, then build tree)
              DRCOV_SO=$(find /opt/virtmcu/lib/qemu/plugins /build/qemu -name "libdrcov.so" 2>/dev/null | head -n 1)
              if [ -z "$DRCOV_SO" ]; then
                echo "Error: libdrcov.so not found in /opt/virtmcu or /build/qemu"
                exit 1
              fi
              echo "Using drcov plugin: $DRCOV_SO"
              # Run with drcov plugin
              qemu-system-arm -M arm-generic-fdt,hw-dtb=test/phase1/minimal.dtb \
                -kernel test/phase1/hello.elf -nographic -m 128M -display none \
                -plugin "$DRCOV_SO",filename=hello.drcov \
                -d plugin
              # Analyze results
              python3 tools/analyze_coverage.py hello.drcov test/phase1/hello.elf --fail-under 80
            '
