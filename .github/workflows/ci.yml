name: CI

# Runs on every push to main and on every PR targeting main.
# Jobs are structured in three tiers:
#   1. lint + unit-tests  — fast, no QEMU, always run in parallel
#   2. build-qemu         — build the Docker builder image (QEMU compiled inside)
#   3. integration        — smoke tests, pytest QMP suite, Robot Framework
#
# The expensive QEMU build is cached via GitHub Actions Docker layer cache
# (type=gha). First run is slow (~40 min); subsequent runs with unchanged
# patches/ and hw/ are fast (~3 min, fully from cache).

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BUILDER_IMAGE: virtmcu-builder
  PYTHON_VERSION: "3.13"
  # CI runners can be slow; raise the zenoh-clock STALL timeout so the device
  # doesn't fire on load spikes.  Local dev keeps the 5 s default for fast feedback.
  VIRTMCU_STALL_TIMEOUT_MS: "120000"
  CI: "true"

# ── Selective Execution ───────────────────────────────────────────────────────

jobs:
  changes:
    name: Check for source changes
    runs-on: ubuntu-latest
    outputs:
      expensive: ${{ steps.filter.outputs.expensive }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            expensive:
              - '!(**/*.md)'
              - '!(docs/**)'
              - '!(.github/**)'
              - '.github/workflows/ci.yml' # Expensive if CI itself changes

# ── Tier 1: Lint ──────────────────────────────────────────────────────────────

  tier1-checks:
    name: Tier 1 (Lint & Unit Tests)
    needs: [changes]
    if: needs.changes.outputs.expensive == 'true' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Load VERSIONS
        run: grep -E -v '^#|^$' VERSIONS >> "$GITHUB_ENV"

      # Required for Devcontainer ownership parity
      - name: Set up Workspace Trust
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build local devenv-base image
        uses: docker/bake-action@v7
        env:
          ARCH: amd64
          PUSH_CACHE: ${{ github.ref == 'refs/heads/main' }}
        with:
          targets: devenv-base
          load: true

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo-ci-registry
          key: cargo-registry-tier1-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-tier1-${{ runner.os }}-

      - name: Fix workspace and Cargo registry permissions
        run: |
          # The GitHub runner uses UID 1001, but our container uses 1000 (vscode).
          # Chown both the workspace and the registry cache so the container can write to them.
          sudo chown -R 1000:1000 .
          mkdir -p "$HOME/.cargo-ci-registry"
          sudo chown -R 1000:1000 "$HOME/.cargo-ci-registry"

      - name: Run Static Analysis (Lint)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo-ci-registry:/usr/local/cargo/registry" \
            -w /workspace \
            -e USER=vscode \
            -e CARGO_TARGET_DIR=/tmp/ci-target \
            ghcr.io/refractsystems/virtmcu/devenv-base:dev-amd64 \
            make lint

      - name: Build Packaging Tools
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo-ci-registry:/usr/local/cargo/registry" \
            -w /workspace \
            -e USER=vscode \
            -e CARGO_TARGET_DIR=/tmp/ci-target \
            ghcr.io/refractsystems/virtmcu/devenv-base:dev-amd64 \
            make build-tools

      - name: Run Tier 1 Unit Tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo-ci-registry:/usr/local/cargo/registry" \
            -w /workspace \
            -e USER=vscode \
            -e CARGO_TARGET_DIR=/tmp/ci-target \
            ghcr.io/refractsystems/virtmcu/devenv-base:dev-amd64 \
            make test-unit

      - name: Restore workspace permissions
        if: always()
        run: |
          # Revert ownership so GHA cleanup/artifact upload works correctly
          sudo chown -R runner:docker .
          sudo chown -R runner:docker "$HOME/.cargo-ci-registry" || true

  # Outputs the list of architectures to build. On pull_request events only
  # amd64 is included — arm64 takes ~40 min and is redundant for PR validation.
  # On push to main and tags both arches are included for full parity.
  setup:
    name: Configure build matrix
    runs-on: ubuntu-latest
    outputs:
      arches: ${{ steps.arches.outputs.arches }}
    steps:
      - name: Set target architectures
        id: arches
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo 'arches=["amd64"]' >> "$GITHUB_OUTPUT"
          else
            echo 'arches=["amd64","arm64"]' >> "$GITHUB_OUTPUT"
          fi

  build-qemu:
    name: Build QEMU — ${{ matrix.arch }}
    needs: [changes, setup]
    if: needs.changes.outputs.expensive == 'true' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.setup.outputs.arches) }}
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      # GitHub's standard ubuntu-latest runners come pre-loaded with ~30GB of unused
      # software (.NET, Android SDK, Haskell). Since our QEMU and Docker image builds
      # are extremely large, we must aggressively reclaim disk space on the host
      # before starting, otherwise we hit 'No space left on device' errors.
      - name: Free disk space
        if: matrix.arch == 'amd64'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6

      - name: Load VERSIONS
        run: grep -E -v '^#|^$' VERSIONS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build and push the 'builder' stage to GHCR.
      # This image is used as a cache for 'publish' and directly by 'smoke-tests'.
      - name: Build and push builder stage
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: ${{ github.ref == 'refs/heads/main' }}
        with:
          targets: |
            base
            toolchain
            builder
          push: true
          files: |
            docker-bake.hcl
            ${{ github.ref == 'refs/heads/main' && 'docker-bake-latest.hcl' || '' }}

      - name: Verify QEMU binary
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-${{ matrix.arch }} \
            qemu-system-arm --version

# ── Tier 3: Publish Environment Images (Parallel Path) ───────────────────────

  publish-devenv-base:
    name: Publish Devenv Base — ${{ matrix.arch }}
    needs: [tier1-checks]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      # GitHub's standard ubuntu-latest runners come pre-loaded with ~30GB of unused
      # software (.NET, Android SDK, Haskell). Since our QEMU and Docker image builds
      # are extremely large, we must aggressively reclaim disk space on the host
      # before starting, otherwise we hit 'No space left on device' errors.
      - name: Free disk space
        if: matrix.arch == 'amd64'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6

      - name: Load VERSIONS
        run: grep -E -v '^#|^$' VERSIONS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push — devenv-base (${{ matrix.arch }})
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "true"
        with:
          targets: devenv-base
          push: true
          files: |
            docker-bake.hcl
            ${{ github.ref == 'refs/heads/main' && 'docker-bake-latest.hcl' || '' }}

  publish-devenv:
    name: Publish Devenv — ${{ matrix.arch }}
    needs: [build-qemu, publish-devenv-base]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      # GitHub's standard ubuntu-latest runners come pre-loaded with ~30GB of unused
      # software (.NET, Android SDK, Haskell). Since our QEMU and Docker image builds
      # are extremely large, we must aggressively reclaim disk space on the host
      # before starting, otherwise we hit 'No space left on device' errors.
      - name: Free disk space
        if: matrix.arch == 'amd64'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6

      - name: Load VERSIONS
        run: grep -E -v '^#|^$' VERSIONS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push — devenv (${{ matrix.arch }})
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "true"
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          targets: devenv
          push: true
          files: |
            docker-bake.hcl
            ${{ github.ref == 'refs/heads/main' && 'docker-bake-latest.hcl' || '' }}
            ${{ startsWith(github.ref, 'refs/tags/') && 'docker-bake-release.hcl' || '' }}

  merge-devenv:
    name: Merge Devenv Manifest
    needs: [publish-devenv]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Load VERSIONS
        run: grep -E -v '^#|^$' VERSIONS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — devenv
        id: meta-devenv
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=virtmcu-devenv
            org.opencontainers.image.description=virtmcu development environment — toolchain + AI tools
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Create and push manifest — devenv
        run: |
          TAGS=$(echo "${{ steps.meta-devenv.outputs.tags }}" | xargs -I {} echo "-t {}")
          # shellcheck disable=SC2086
          docker buildx imagetools create ${TAGS} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-arm64

# ── Tier 4: Smoke Tests (matrix) ─────────────────────────────────────────────
#
# Each phase runs its test/phaseX/smoke_test.sh inside the builder container
# with the workspace mounted at /workspace. Phases that need Python packages
# or a .venv get a per-phase pre-setup command.

  smoke-tests:
    name: Smoke — ${{ matrix.name }} (${{ matrix.arch }})
    needs: [changes, build-qemu, tier1-checks, setup]
    if: needs.changes.outputs.expensive == 'true' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.setup.outputs.arches) }}
        phase: ["1", "2", "3", "3.5", "4", "5", "6", "7", "8", "9", "10", "11", "11_3", "12", "13", "14", "16", "27", "qmp", "robot"]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
          - phase: "1"
            name: "Phase 1 (Minimal Boot)"
          - phase: "2"
            name: "Phase 2 (QOM Plugins)"
          - phase: "3"
            name: "Phase 3 (repl2qemu)"
          - phase: "3.5"
            name: "Phase 3.5 (YAML Platforms)"
          - phase: "4"
            name: "Phase 4 (Robot Framework)"
          - phase: "5"
            name: "Phase 5 (SystemC Bridge)"
          - phase: "6"
            name: "Phase 6 (Zenoh Multi-Node)"
          - phase: "7"
            name: "Phase 7 (Zenoh Clock)"
          - phase: "8"
            name: "Phase 8 (Multi-Node UART)"
          - phase: "9"
            name: "Phase 9 (SystemC Media)"
          - phase: "10"
            name: "Phase 10 (Physics SAL/AAL)"
          - phase: "11"
            name: "Phase 11 (RISC-V Expansion)"
          - phase: "11_3"
            name: "Phase 11.3 (Remote Port)"
          - phase: "12"
            name: "Phase 12 (Advanced Observability)"
          - phase: "13"
            name: "Phase 13 (AI Debugging & MCP)"
          - phase: "14"
            name: "Phase 14 (Wireless & IoT)"
          - phase: "16"
            name: "Phase 16 (Perf & Determinism)"
          - phase: "27"
            name: "Phase 27 (FlexRay)"
          - phase: "qmp"
            name: "pytest (QMP Suite)"
          - phase: "robot"
            name: "Robot Framework (Renode Parity)"

    steps:
      - uses: actions/checkout@v6

      - name: Load VERSIONS
        run: grep -E -v '^#|^$' VERSIONS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Pull builder image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-${{ matrix.arch }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-${{ matrix.arch }} ${{ env.BUILDER_IMAGE }}:${{ github.sha }}

      - name: Run ${{ matrix.name }}
        run: |
          mkdir -p coverage-data
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            -e GCOV_PREFIX=/workspace/coverage-data \
            -e GCOV_PREFIX_STRIP=3 \
            -e USER=vscode \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash scripts/ci-phase.sh ${{ matrix.phase }}

      - name: Upload results and coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: results-phase-${{ matrix.phase }}-${{ matrix.arch }}
          path: |
            test-results/
            coverage-data/

# ── Tier 5: Peripheral Coverage Report ───────────────────────────────────────
#
# Collects .gcda files from the QEMU build tree after all integration tests
# have run and generates a unified coverage report for the C plugins.

  peripheral-coverage:
    name: Peripheral C Coverage
    needs: [changes, smoke-tests]
    if: needs.changes.outputs.expensive == 'true' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load VERSIONS
        run: grep -E -v '^#|^$' VERSIONS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Pull builder image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-amd64
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-amd64 ${{ env.BUILDER_IMAGE }}:${{ github.sha }}

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v6
        with:
          path: all-coverage
          pattern: results-phase-*-amd64
          merge-multiple: true

      - name: Generate unified peripheral coverage
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e USER=vscode \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash scripts/test-coverage-peripheral.sh

      - name: Upload peripheral coverage results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: peripheral-c-coverage
          path: test-results/

# ── Tier 5: Guest Firmware Coverage ──────────────────────────────────────────
#
# Uses QEMU TCG plugins (drcov) to track guest firmware execution and maps
# results back to ELF symbols to ensure tests exercise the HAL.

  firmware-coverage:
    name: Guest Firmware Coverage
    needs: [changes, build-qemu, tier1-checks]
    if: needs.changes.outputs.expensive == 'true' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load VERSIONS
        run: grep -E -v '^#|^$' VERSIONS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Pull builder image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-amd64
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/builder:sha-${{ github.sha }}-amd64 ${{ env.BUILDER_IMAGE }}:${{ github.sha }}

      - name: Run coverage analysis (Phase 1)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHONPATH=/workspace \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }} \
            bash scripts/test-coverage-guest.sh

# ── Tier 6: Publish Runtime (after validation) ──────────────────────────────

  publish-runtime:
    name: Publish Runtime — ${{ matrix.arch }}
    needs: [smoke-tests, peripheral-coverage, firmware-coverage]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Load VERSIONS
        run: grep -E -v '^#|^$' VERSIONS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push — runtime (${{ matrix.arch }})
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "true"
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          targets: runtime
          push: true
          files: |
            docker-bake.hcl
            ${{ github.ref == 'refs/heads/main' && 'docker-bake-latest.hcl' || '' }}
            ${{ startsWith(github.ref, 'refs/tags/') && 'docker-bake-release.hcl' || '' }}

  merge-runtime:
    name: Merge Runtime Manifest
    needs: [publish-runtime]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Load VERSIONS
        run: grep -E -v '^#|^$' VERSIONS >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name for GHCR
        run: |
          echo "IMAGE_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — runtime
        id: meta-runtime
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/runtime
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=virtmcu-runtime
            org.opencontainers.image.description=virtmcu runtime image — QEMU + Python simulation tools
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Create and push manifest — runtime
        run: |
          TAGS=$(echo "${{ steps.meta-runtime.outputs.tags }}" | xargs -I {} echo "-t {}")
          # shellcheck disable=SC2086
          docker buildx imagetools create ${TAGS} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/runtime:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/runtime:sha-${{ github.sha }}-arm64
