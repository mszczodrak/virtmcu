name: Miri Undefined Behavior Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-miri-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Check for Rust source changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'hw/rust/**'
              - '.github/workflows/ci-miri.yml'

  test-miri:
    name: Test with Miri
    needs: [changes]
    if: needs.changes.outputs.rust == 'true' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Rust nightly toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/tmp
          key: miri-nightly-${{ runner.os }}-${{ hashFiles('hw/rust/**/*.toml', 'hw/rust/**/*.lock') }}
          restore-keys: |
            miri-nightly-${{ runner.os }}-

      - name: Install Rust Nightly with Miri
        run: |
          rustup toolchain install nightly --profile minimal --component miri
          rustup default nightly

      - name: Run cargo miri test
        run: |
          cd hw/rust
          cargo miri setup
          MIRIFLAGS="-Zmiri-disable-isolation" cargo miri test
