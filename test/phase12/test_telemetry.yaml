machine:
  cpus:
    - name: cpu0
      type: cortex-a9
peripherals:
  - name: memory
    type: Memory.MappedMemory
    address: 0x40000000
    properties:
      size: '0x01000000'
  - name: telemetry0
    type: zenoh-telemetry
    properties:
      node: 0
  - name: uart0
    type: UART.PL011
    address: 0x09000000
