---
machine:
  cpus:
    - name: cpu0
      type: cortex-a15
peripherals:
  - name: memory
    type: Memory.MappedMemory
    address: 0x40000000
    properties:
      size: 0x01000000
  - name: uart0
    type: UART.PL011
    address: 0x09000000
    properties:
      size: 0x1000
  - name: my_uart_echo
    type: uart-echo
    parent: uart0
    address: 0
