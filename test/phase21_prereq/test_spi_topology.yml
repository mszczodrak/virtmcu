
machine:
  cpus:
    - name: cpu0
      type: cortex-a15
peripherals:
  - name: memory
    type: Memory.MappedMemory
    address: 0x40000000
    properties:
      size: 0x01000000
  - name: spi0
    type: SPI.PL022
    address: 0x10000000
    properties:
      size: 0x1000
  - name: my_spi_echo
    type: spi-echo
    parent: spi0
    address: 0
